<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">opencode-openai-fallback social card</title>
  <desc id="desc">A dark social card that says Stack your own workspaces and up to 4x more opencode headroom.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090B12"/>
      <stop offset="0.48" stop-color="#101B2F"/>
      <stop offset="1" stop-color="#07160F"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="80" x2="1020" y2="550" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.45" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.75 0 0 0 0 0.85 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="110" r="210" fill="#0EA5E9" opacity="0.18" filter="url(#glow)"/>
  <circle cx="160" cy="560" r="240" fill="#22C55E" opacity="0.15" filter="url(#glow)"/>
  <rect x="66" y="66" width="1068" height="498" rx="34" fill="#0B1020" opacity="0.76" stroke="url(#accent)" stroke-width="2"/>
  <text x="100" y="132" fill="#93C5FD" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="2">OPENCODE-OPENAI-FALLBACK</text>
  <text x="100" y="250" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="76" font-weight="800">Stack your own</text>
  <text x="100" y="338" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="76" font-weight="800">workspaces.</text>
  <text x="100" y="412" fill="#C7D2FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="600">Keep opencode moving when one hits a limit.</text>
  <g transform="translate(104,462)">
    <rect width="496" height="62" rx="31" fill="url(#accent)"/>
    <text x="28" y="40" fill="#03111D" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="800">up to 4x more headroom</text>
  </g>
  <g transform="translate(760,194)">
    <rect x="0" y="0" width="112" height="112" rx="24" fill="#111827" stroke="#60A5FA" stroke-width="2"/>
    <rect x="132" y="0" width="112" height="112" rx="24" fill="#111827" stroke="#22C55E" stroke-width="2"/>
    <rect x="0" y="132" width="112" height="112" rx="24" fill="#111827" stroke="#A78BFA" stroke-width="2"/>
    <rect x="132" y="132" width="112" height="112" rx="24" fill="#111827" stroke="#F59E0B" stroke-width="2"/>
    <text x="37" y="68" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="800">pp</text>
    <text x="169" y="68" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="800">ps</text>
    <text x="37" y="200" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="800">sp</text>
    <text x="169" y="200" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="800">ss</text>
  </g>
  <text x="724" y="490" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600">your own authenticated ChatGPT workspaces</text>
</svg>
