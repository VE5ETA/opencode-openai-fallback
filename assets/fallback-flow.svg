<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fallback flow</title>
  <desc id="desc">Four workspace cards show fallback order from pp to ps to sp to ss.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111F"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="line" x1="170" y1="315" x2="1030" y2="315" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="74" y="94" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="48" font-weight="800">Fallback chain</text>
  <text x="76" y="138" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26" font-weight="600">usage limit reached -&gt; try next workspace</text>
  <path d="M242 315 H958" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <path d="M945 295 L975 315 L945 335" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <g transform="translate(90 230)">
      <rect width="180" height="170" rx="28" fill="#0F172A" stroke="#60A5FA" stroke-width="3"/>
      <text x="63" y="82" fill="#F8FAFC" font-size="44" font-weight="800">pp</text>
      <text x="34" y="122" fill="#93C5FD" font-size="20" font-weight="700">primary</text>
      <text x="42" y="148" fill="#93C5FD" font-size="20" font-weight="700">personal</text>
    </g>
    <g transform="translate(340 230)">
      <rect width="180" height="170" rx="28" fill="#0F172A" stroke="#22C55E" stroke-width="3"/>
      <text x="65" y="82" fill="#F8FAFC" font-size="44" font-weight="800">ps</text>
      <text x="34" y="122" fill="#86EFAC" font-size="20" font-weight="700">primary</text>
      <text x="50" y="148" fill="#86EFAC" font-size="20" font-weight="700">shared</text>
    </g>
    <g transform="translate(590 230)">
      <rect width="180" height="170" rx="28" fill="#0F172A" stroke="#A78BFA" stroke-width="3"/>
      <text x="63" y="82" fill="#F8FAFC" font-size="44" font-weight="800">sp</text>
      <text x="29" y="122" fill="#C4B5FD" font-size="20" font-weight="700">secondary</text>
      <text x="42" y="148" fill="#C4B5FD" font-size="20" font-weight="700">personal</text>
    </g>
    <g transform="translate(840 230)">
      <rect width="180" height="170" rx="28" fill="#0F172A" stroke="#F59E0B" stroke-width="3"/>
      <text x="65" y="82" fill="#F8FAFC" font-size="44" font-weight="800">ss</text>
      <text x="29" y="122" fill="#FCD34D" font-size="20" font-weight="700">secondary</text>
      <text x="50" y="148" fill="#FCD34D" font-size="20" font-weight="700">shared</text>
    </g>
  </g>
  <rect x="74" y="486" width="640" height="60" rx="30" fill="#111827" stroke="#334155"/>
  <text x="106" y="525" fill="#E2E8F0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="25" font-weight="700">shared opencode sessions stay intact</text>
</svg>
