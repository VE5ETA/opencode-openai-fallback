<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Up to 4x opencode headroom</title>
  <desc id="desc">Four stacked workspace bars show up to 4x headroom using your own authenticated workspaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1E"/>
      <stop offset="1" stop-color="#052E23"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="560" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="78" y="118" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="64" font-weight="800">Up to 4x headroom</text>
  <text x="82" y="166" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="600">with your own authenticated ChatGPT workspaces</text>
  <g transform="translate(86 236)" font-family="Segoe UI, Inter, Arial, sans-serif">
    <rect x="0" y="0" width="260" height="62" rx="16" fill="url(#bar)" opacity="0.38"/>
    <rect x="0" y="78" width="360" height="62" rx="16" fill="url(#bar)" opacity="0.52"/>
    <rect x="0" y="156" width="460" height="62" rx="16" fill="url(#bar)" opacity="0.68"/>
    <rect x="0" y="234" width="560" height="62" rx="16" fill="url(#bar)" opacity="0.95"/>
    <text x="24" y="40" fill="#F8FAFC" font-size="24" font-weight="800">workspace 1</text>
    <text x="24" y="118" fill="#F8FAFC" font-size="24" font-weight="800">workspace 2</text>
    <text x="24" y="196" fill="#F8FAFC" font-size="24" font-weight="800">workspace 3</text>
    <text x="24" y="274" fill="#03111D" font-size="24" font-weight="900">workspace 4</text>
  </g>
  <g transform="translate(760 238)" font-family="Segoe UI, Inter, Arial, sans-serif">
    <rect width="320" height="238" rx="30" fill="#0F172A" stroke="#22C55E" stroke-width="2"/>
    <text x="38" y="70" fill="#86EFAC" font-size="30" font-weight="800">Not unlimited.</text>
    <text x="38" y="118" fill="#F8FAFC" font-size="26" font-weight="700">Fallback across</text>
    <text x="38" y="154" fill="#F8FAFC" font-size="26" font-weight="700">workspaces you own.</text>
    <text x="38" y="204" fill="#CBD5E1" font-size="20" font-weight="600">Availability and limits vary.</text>
  </g>
  <text x="82" y="574" fill="#94A3B8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600">opencode-openai-fallback</text>
</svg>
